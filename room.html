<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบส่งเวรประจำวัน SMTE</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    :root { 
      --smte-blue: #4682B4; 
      --pastel-pink: #FFD1DC; 
      --bg-color: #F0F2F5; 
      --text-dark: #2C3E50; 
    }

    body { 
      background: linear-gradient(135deg, #E0EAFC 0%, #CFDEF3 100%); 
      font-family: 'Sarabun', sans-serif; 
      min-height: 100vh; 
      display: flex; 
      justify-content: center; 
      padding: 60px 20px 20px 20px;
      margin: 0; 
      color: var(--text-dark); 
    }

    .container { max-width: 460px; width: 100%; }

    .main-card { 
      background: rgba(255, 255, 255, 0.9); 
      backdrop-filter: blur(15px); 
      border-radius: 28px; 
      padding: 20px 20px 35px 20px; 
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1); 
      border: 1px solid rgba(255, 255, 255, 0.6); 
      display: flex; 
      flex-direction: column; 
      position: relative;
    }

    .logo-container { 
      text-align: center; 
      margin-top: -90px; 
      margin-bottom: 15px;
      position: relative;
      z-index: 10;
    }

    .main-logo { 
      width: 150px; 
      height: 150px;
      object-fit: cover; 
      background: white; 
      border-radius: 50%; 
      border: 6px solid white; 
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      display: inline-block;
    }

    .header-section h3 { color: var(--smte-blue); font-weight: 700; text-align: center; margin-bottom: 5px; }
    .header-section p { color: #7F8C8D; font-size: 0.85rem; text-align: center; margin-bottom: 25px; }

    .btn-day { 
      height: 60px; 
      border: none; 
      border-radius: 18px; 
      margin-bottom: 12px; 
      font-size: 1.05rem; 
      font-weight: 700; 
      color: #444; 
      background: #FFFFFF; 
      transition: all 0.3s ease; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      width: 100%; 
      box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
    }
    .btn-day:hover { transform: translateY(-3px); background: var(--pastel-pink); color: #D14780; }
    .mon { border-left: 8px solid #FFD700; } .tue { border-left: 8px solid #FF69B4; } 
    .wed { border-left: 8px solid #3CB371; } .thu { border-left: 8px solid #FFA500; } 
    .fri { border-left: 8px solid #1E90FF; }

    .student-item { background: rgba(255, 255, 255, 0.7); padding: 14px; border-radius: 18px; margin-bottom: 10px; border: 1px solid #E1E8ED; display: flex; justify-content: space-between; align-items: center; }
    .btn-group .btn-check + .btn { border-radius: 10px !important; border: none; padding: 6px 12px; font-size: 0.75rem; background: #F1F3F5; color: #adb5bd; margin: 0 2px; }
    .btn-group .btn-check:checked + .btn-outline-success { background: #D4EDDA !important; color: #155724 !important; }
    .btn-group .btn-check:checked + .btn-outline-danger { background: #F8D7DA !important; color: #721C24 !important; }
    .btn-group .btn-check:checked + .btn-outline-warning { background: #FFF3CD !important; color: #856404 !important; }

    .btn-submit { background: linear-gradient(135deg, var(--smte-blue) 0%, #8EADCC 100%); color: #FFFFFF !important; text-shadow: 0 1px 2px rgba(0,0,0,0.2); border: none; border-radius: 20px; padding: 16px; font-weight: 700; margin-top: 10px; box-shadow: 0 8px 20px rgba(70, 130, 180, 0.3); transition: 0.3s; }
    .pdpa-box { background: rgba(255, 255, 255, 0.5); border-radius: 12px; padding: 10px; font-size: 0.75rem; color: #636e72; border: 1px solid #dfe6e9; margin-top: 15px; }
    
    .copyright { text-align: center; font-size: 0.7rem; color: #b2bec3; margin-top: 25px; padding-top: 15px; border-top: 1px dashed #dfe6e9; }
    #formPage { display: none; }
    
    /* สไตล์ใหม่สำหรับวันที่ที่ดูได้อย่างเดียว */
    .date-display-box {
      background-color: #f8f9fa;
      border: 1px solid #DEE2E6;
      border-radius: 12px;
      padding: 10px 15px;
      font-weight: 600;
      color: #2C3E50;
      pointer-events: none; /* ห้ามกดเด็ดขาด */
    }

    .btn-back { color: #95A5A6; text-decoration: none; font-size: 0.85rem; cursor: pointer; }
  </style>
</head>
<body>

  <div class="container">
    <div class="main-card">
      
      <div id="selectDayPage">
        <div class="logo-container">
          <img src="https://i.postimg.cc/rsVTMcvN/Untitled-design-(1).png" alt="SMTE Logo" class="main-logo">
        </div>

        <div class="header-section">
          <h3> DEK SMTE 12 </h3>
          <p>ระบบส่งเวรประจำวัน Room 544</p>
        </div>

        <div class="d-grid">
          <button class="btn btn-day mon" onclick="showForm('วันจันทร์')">วันจันทร์</button>
          <button class="btn btn-day tue" onclick="showForm('วันอังคาร')">วันอังคาร</button>
          <button class="btn btn-day wed" onclick="showForm('วันพุธ')">วันพุธ</button>
          <button class="btn btn-day thu" onclick="showForm('วันพฤหัสบดี')">วันพฤหัสบดี</button>
          <button class="btn btn-day fri" onclick="showForm('วันศุกร์')">วันศุกร์</button>
        </div>
      </div>

      <div id="formPage">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h4 class="mb-0" style="font-weight: 700; color: var(--smte-blue);"><span id="displayDay"></span></h4>
          <span class="btn-back" onclick="goBack()">← ย้อนกลับ</span>
        </div>
        
        <form id="dutyForm">
          <input type="hidden" name="dayName" id="inputDayName">
          <div class="mb-3">
            <label class="form-label small fw-bold text-muted">วันที่ส่งเวร (วันนี้เท่านั้น)</label>
            <input type="date" name="selectedDate" id="selectedDate" style="display: none;">
            <div id="dateTextDisplay" class="date-display-box"></div>
          </div>
          <div id="studentContainer" class="mb-4"></div>
          <div class="mb-3">
            <label class="form-label small fw-bold text-muted">📸 รูปถ่ายสมาชิกและรูปในห้อง (2 รูป)</label>
            <input type="file" name="img1" id="img1" class="form-control mb-2" accept="image/*" required>
            <input type="file" name="img2" id="img2" class="form-control" accept="image/*" required>
          </div>

          <div class="pdpa-box">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="pdpaCheck">
              <label class="form-check-label" for="pdpaCheck">
                ยินยอมให้ส่งข้อมูลและรูปภาพเข้ากลุ่ม Telegram เพื่อแจ้งเตือนเท่านั้น
              </label>
            </div>
          </div>

          <button type="button" id="submitBtn" onclick="submitToTelegram()" class="btn btn-submit w-100">SEND TO TELEGRAM / ส่งข้อมูล</button>
        </form>
      </div>

      <div class="copyright">
        &copy; 2026 ธนยศ ฐิตะสาร สงวนลิขสิทธิ์ทุกประการ.<br>
        พัฒนาขึ้นเพื่อวัตถุประสงค์ทางความสะอาด.
      </div>

    </div>
  </div>

<script>
  const dutyRoster = {
    "วันจันทร์": ["ธนนุกูล หลักคำ", "ธนยศ ฐิตะสาร", "อคิราภ์ กล้าหาญ", "วรพงศ์ ทองสุวรรณ"],
    "วันอังคาร": ["สิริวิมล อร่ามศรี", "ณัฐธยาน์ ทองสุก", "คณิตา บัวงาม", "ภภีมม์ ร้อยพิลา", "สุธาสินี พิทักษ์วงดีงาม"],
    "วันพุธ": ["ศิรินภาพร จันทร์สว่าง", "ปัญจวิชญ์ อักษรดี", "ศิวกร กอแก้ว", "สุรัฐติกาล ทองแพรว", "พิมพิกา สำราญวงค์"],
    "วันพฤหัสบดี": ["อุษมา ทองเขื่อน", "อุบนรักษ์ เเซ่อึง", "ณรินทร์ภัทร ภูนาเหนือ", "ชนิศา บุญจอง", "เกษเเก้ว วงศ์สมบูรณ์", "อินทิรา เสียวคำ", "มัลริกา ปัดฐพิมพ์"],
    "วันศุกร์": ["พงษ์พิพัฒ พันงาม", "ญาณิศา โครตสมบัติ", "ชัญญานุช สำอางค์", "ณัฐนิชา ไพรเลียง", "พิชามญชุ์ สุขดี", "ธิดารัตน์ ภาระพันธ์"]
  };

  let currentDayFriends = [];

  function showForm(day) {
    document.getElementById('selectDayPage').style.display = 'none';
    document.getElementById('formPage').style.display = 'block';
    document.getElementById('displayDay').innerText = day;
    document.getElementById('inputDayName').value = day;
    
    const dateInput = document.getElementById('selectedDate');
    const dateTextDisplay = document.getElementById('dateTextDisplay');
    const today = new Date();
    
    // จัดรูปแบบวันที่ YYYY-MM-DD สำหรับระบบ
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    const todayString = `${yyyy}-${mm}-${dd}`;
    
    // จัดรูปแบบวันที่สำหรับแสดงผลให้คนดู (ไทย)
    const options = { year: 'numeric', month: 'long', day: 'numeric' };
    const dateFormattedThai = today.toLocaleDateString('th-TH', options);
    
    // บังคับล็อกค่า
    dateInput.value = todayString;
    dateTextDisplay.innerText = dateFormattedThai;

    currentDayFriends = dutyRoster[day] || [];
    renderStudents(currentDayFriends);
    window.scrollTo(0,0);
  }

  function goBack() {
    document.getElementById('dutyForm').reset();
    document.getElementById('formPage').style.display = 'none';
    document.getElementById('selectDayPage').style.display = 'block';
  }

  function renderStudents(names) {
    const container = document.getElementById('studentContainer');
    container.innerHTML = '<label class="form-label small fw-bold text-muted mb-2">เช็คชื่อสมาชิก</label>';
    names.forEach((name, i) => {
      container.innerHTML += `
        <div class="student-item">
          <span style="font-weight: 600; font-size: 0.9rem;">${name}</span>
          <div class="btn-group" role="group">
            <input type="radio" class="btn-check" name="status_${i}" id="t_${i}" value="ทำเวร" checked>
            <label class="btn btn-outline-success btn-sm" for="t_${i}">ทำ</label>
            <input type="radio" class="btn-check" name="status_${i}" id="f_${i}" value="ไม่ทำ">
            <label class="btn btn-outline-danger btn-sm" for="f_${i}">ไม่</label>
            <input type="radio" class="btn-check" name="status_${i}" id="l_${i}" value="ลา">
            <label class="btn btn-outline-warning btn-sm" for="l_${i}">ลา</label>
          </div>
        </div>`;
    });
  }

  async function submitToTelegram() {
    const TELEGRAM_TOKEN = "8658207918:AAF0FPOJyIGKyxbx6Oan8-9JuPlQvEOI7jk";
    const CHAT_ID = "-5274914911";
    
    const btn = document.getElementById('submitBtn');
    const pdpa = document.getElementById('pdpaCheck').checked;
    const img1 = document.getElementById('img1').files[0];
    const img2 = document.getElementById('img2').files[0];

    if(!img1 || !img2) {
      Swal.fire({ icon: 'warning', title: 'แนบรูปภาพ!', text: 'กรุณาแนบรูปภาพให้ครบทั้ง 2 รูป' });
      return;
    }
    if(!pdpa) {
      Swal.fire({ icon: 'info', title: 'PDPA', text: 'กรุณากดยอมรับเงื่อนไขก่อนส่งข้อมูล' });
      return;
    }

    btn.disabled = true;
    Swal.fire({ title: 'กำลังส่งแจ้งเตือน...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

    try {
      const dayName = document.getElementById('inputDayName').value;
      const selectedDate = document.getElementById('selectedDate').value;
      const now = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });

      let listDone = [], listLeave = [], listMissing = [];
      currentDayFriends.forEach((name, i) => {
        const status = document.querySelector(`input[name="status_${i}"]:checked`).value;
        if (status === "ทำเวร") listDone.push("✅ " + name);
        else if (status === "ลา") listLeave.push("🟡 " + name);
        else listMissing.push("❌ " + name);
      });

      let message = `*📢  รายงานการส่งเวร : ${dayName}*\n📅  วันที่ : ${selectedDate}\n⏰  เวลา : ${now} น.\n\n`;
      message += `*🟢 มาทำเวร:*\n${listDone.join("\n") || "- ไม่มี -"}\n\n`;
      message += `*🟡 ลา:*\n${listLeave.join("\n") || "- ไม่มี -"}\n\n`;
      message += `*🔴 ไม่มาทำ:*\n${listMissing.join("\n") || "- ไม่มี -"}\n\n`;
      message += `_แจ้งเตือนผ่าน ระบบส่งเวรประจำวัน_`;

      const formData = new FormData();
      formData.append('chat_id', CHAT_ID);
      const media = [
        { type: 'photo', media: 'attach://p1', caption: message, parse_mode: 'Markdown' },
        { type: 'photo', media: 'attach://p2' }
      ];
      formData.append('media', JSON.stringify(media));
      formData.append('p1', img1);
      formData.append('p2', img2);

      const response = await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMediaGroup`, {
        method: 'POST',
        body: formData
      });

      if(response.ok) {
        Swal.fire({ icon: 'success', title: 'ส่งรายงานสำเร็จ!' }).then(() => goBack());
      } else {
        throw new Error('Telegram API Error');
      }

    } catch (err) {
      Swal.fire({ icon: 'error', title: 'ล้มเหลว', text: 'เกิดข้อผิดพลาดในการส่งข้อมูล: ' + err });
    } finally {
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
